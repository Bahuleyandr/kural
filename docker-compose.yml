# Production compose — no bind mounts, baked image runs as non-root.
# For local development with live reload, layer on docker-compose.dev.yml:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        # KURAL_FLAVOUR=lite (~600 MB, Kokoro only) | clone (~2 GB, +Chatterbox)
        KURAL_FLAVOUR: ${KURAL_FLAVOUR:-lite}
    # Bind to the loopback interface only. Override with KURAL_BIND=0.0.0.0
    # (and set KURAL_API_KEY) to expose on a LAN.
    ports:
      - "${KURAL_BIND:-127.0.0.1}:8000:8000"
    volumes:
      - kural_model_cache:/home/kural/.cache/kural/kokoro
      - kural_clone_cache:/home/kural/.cache/kural/clones
    environment:
      - TTS_ENGINE=kokoro-onnx
      - KURAL_API_KEY=${KURAL_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked at build time — use localhost so the
        # browser can reach the backend's exposed port directly.
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "${KURAL_BIND:-127.0.0.1}:3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  kural_model_cache:
  kural_clone_cache:
