name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 ffmpeg espeak-ng
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements-dev.txt
      - name: Run backend tests
        working-directory: backend
        run: python -m pytest

  mcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install MCP server dependencies
        working-directory: mcp
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run MCP server tests
        working-directory: mcp
        run: python -m pytest

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Lint
        working-directory: frontend
        run: pnpm lint
      - name: Unit tests
        working-directory: frontend
        run: pnpm test:unit
      - name: Build
        working-directory: frontend
        run: pnpm build
      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        working-directory: frontend
        run: pnpm test:e2e

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose file
        run: docker compose config
      - name: Build images
        run: docker compose build

  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev libssl-dev build-essential
      - name: Build static frontend
        working-directory: frontend
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm build:desktop
      - name: Check desktop crate
        working-directory: desktop/src-tauri
        run: cargo check --locked
      - name: Check release helper scripts
        run: |
          python -m compileall desktop/scripts
          KURAL_UPDATER_PUBLIC_KEY=test-public-key python desktop/scripts/render-release-config.py --output /tmp/kural-release-test.json
          mkdir -p /tmp/kural-artifacts
          printf artifact > /tmp/kural-artifacts/Kural.AppImage
          printf signature > /tmp/kural-artifacts/Kural.AppImage.sig
          printf '{"version":"0.2.0"}' > /tmp/kural-artifacts/latest.json
          python desktop/scripts/smoke-release-artifacts.py --bundle-dir /tmp/kural-artifacts --require-signatures

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${asset}" -o "/tmp/${asset}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o /tmp/gitleaks_checksums.txt
          grep " ${asset}$" /tmp/gitleaks_checksums.txt | (cd /tmp && sha256sum -c -)
          tar -xzf "/tmp/${asset}" -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version
      - name: Secret scan
        run: gitleaks detect --source . --redact --verbose
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Frontend production audit
        working-directory: frontend
        run: |
          corepack enable
          pnpm audit --prod --audit-level high
      - name: License file check
        run: test -f LICENSE && grep -q "MIT License" LICENSE

  backend-integration:
    runs-on: ubuntu-latest
    # Real Kokoro inference smoke. Pulls models, runs once, fails on silent WAV.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install system libraries
        run: sudo apt-get update && sudo apt-get install -y libsndfile1 ffmpeg espeak-ng
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e . -r requirements-dev.txt
      - name: Download Kokoro models
        working-directory: backend
        run: python scripts/download_models.py
      - name: Run Kokoro integration test
        working-directory: backend
        env:
          KURAL_RUN_INTEGRATION: "1"
        run: python -m pytest tests/test_engine_integration.py -v

      - name: Install Chatterbox runtime
        working-directory: backend
        run: |
          pip install torch==2.6.0+cpu torchaudio==2.6.0+cpu --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements-clone.txt
          pip install --no-deps chatterbox-tts==0.1.7

      - name: Run Chatterbox integration test
        working-directory: backend
        env:
          KURAL_RUN_INTEGRATION: "1"
          HF_HUB_DISABLE_TELEMETRY: "1"
        run: python -m pytest tests/test_clone_engine_integration.py -v
