version: 2
updates:
  # Keep third-party (and first-party) GitHub Actions current — actions are
  # pinned by commit SHA, so Dependabot is what advances them safely.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /cli
    schedule:
      interval: weekly

  - package-ecosystem: pip
    directory: /mcp
    schedule:
      interval: weekly

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly

  - package-ecosystem: cargo
    directory: /desktop/src-tauri
    schedule:
      interval: weekly
